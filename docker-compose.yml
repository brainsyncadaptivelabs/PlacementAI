
services:

  mysql:
    image: mysql:8.0
    container_name: placement-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: placementai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: placement-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: placement-backend
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_PROFILES_ACTIVE: ${PERF_PROFILE:-standard}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/placementai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: ${JWT_SECRET}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      ADMIN_REGISTRATION_CODE: ${ADMIN_REGISTRATION_CODE}
      FRONTEND_URL: ${FRONTEND_URL}
      OLLAMA_API_URL: http://host.docker.internal:11434/api/generate
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      PISTON_API_URL: http://piston:2000/api/v2
      SPRING_DATA_REDIS_HOST: redis
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-YOUR_GOOGLE_CLIENT_ID}
      JAVA_OPTS: "-Xms${JAVA_XMS:-512m} -Xmx${JAVA_XMX:-1g} -XX:+UseG1GC -XX:+UseStringDeduplication"

  piston:
    image: ghcr.io/engineer-man/piston
    container_name: placement-piston
    restart: always
    privileged: true
    ports:
      - "2000:2000"
    volumes:
      - piston-data:/piston

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-YOUR_GOOGLE_CLIENT_ID}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: placement-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-YOUR_GOOGLE_CLIENT_ID}
      NEXT_PUBLIC_FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-YOUR_FB_APP_ID}
      NEXT_PUBLIC_APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-YOUR_APPLE_CLIENT_ID}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}


volumes:
  mysql-data:
  piston-data: