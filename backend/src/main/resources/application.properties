spring.application.name=backend

# Async support for SSE
spring.mvc.async.request-timeout=300000
server.servlet.session.timeout=30m

# Performance Optimizations
spring.main.lazy-initialization=true
spring.threads.virtual.enabled=true

spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Caching
spring.cache.type=redis
spring.cache.cache-names=roadmaps,jd_analysis,skills_gap,dashboard_stats
spring.cache.redis.time-to-live=3600000

server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

logging.level.root=WARN
logging.level.com.aiplacement.backend=INFO

spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=8
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000

spring.jpa.properties.hibernate.default_batch_fetch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/placementai}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=update

spring.flyway.baseline-on-migrate=true
spring.flyway.enabled=true

server.port=8080

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

ollama.api.url=${OLLAMA_API_URL:http://localhost:11434/api/generate}
ollama.model=${OLLAMA_MODEL:mistral}
ollama.temperature=${OLLAMA_TEMPERATURE:0.7}
ollama.top-p=${OLLAMA_TOP_P:0.9}
ollama.repeat-penalty=${OLLAMA_REPEAT_PENALTY:1.15}
ollama.num-ctx=${OLLAMA_NUM_CTX:8192}
ollama.num-predict=${OLLAMA_NUM_PREDICT:1024}

piston.api.url=${PISTON_API_URL:http://localhost:2000/api/v2}

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.file.name=logs/backend.log

jwt.secret=${JWT_SECRET:ThisIsMyVerySecretKeyForJwtTokenGeneration123456789}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dummy}
cloudinary.api-key=${CLOUDINARY_API_KEY:dummy}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:dummy}

google.client-id=${GOOGLE_CLIENT_ID:dummy}
admin.registration.code=${ADMIN_REGISTRATION_CODE:ADMIN123}
frontend.url=${FRONTEND_URL:http://localhost:3000}

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

management.health.redis.enabled=false
management.health.mail.enabled=false

razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_SyxPfm0CnhaMos}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:UnRx6egZosu7DtQSBib5wVrk}


