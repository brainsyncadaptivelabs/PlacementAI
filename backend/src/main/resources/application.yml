# ============================================================
# PlacementAI – Main Application Configuration
# ============================================================
# All sensitive values MUST be supplied via environment variables.
# Defaults are provided only for local development convenience.
# Never commit real credentials to source control.
# ============================================================

spring:
  application:
    name: backend

  # ── Async / SSE ──────────────────────────────────────────
  mvc:
    async:
      request-timeout: 300000

  servlet:
    session:
      timeout: 30m
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  # ── Performance ──────────────────────────────────────────
  main:
    lazy-initialization: true
  threads:
    virtual:
      enabled: true

  # ── JPA / Datasource ─────────────────────────────────────
  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        default_batch_fetch_size: 100
        order_inserts: true
        order_updates: true

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/placementai}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      minimum-idle: 2
      maximum-pool-size: 8
      connection-timeout: 5000
      idle-timeout: 30000
      max-lifetime: 600000

  # ── Flyway ───────────────────────────────────────────────
  flyway:
    baseline-on-migrate: true
    baseline-version: 5
    enabled: false

  # ── Caching ──────────────────────────────────────────────
  cache:
    type: simple
    cache-names: roadmaps,jd_analysis,skills_gap,dashboard_stats,placement_context,placement_readiness

  # ── Redis ────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # ── Email ────────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ── Server ───────────────────────────────────────────────────
server:
  port: ${PORT:8080}
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024

# ── Logging ──────────────────────────────────────────────────
logging:
  level:
    root: WARN
    com.aiplacement.backend: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  file:
    name: logs/backend.log

# ============================================================
# NVIDIA Build API Configuration
# ============================================================
# Required: Set NVIDIA_API_KEY environment variable.
# Obtain your API key from: https://build.nvidia.com
# ============================================================
nvidia:
  api:
    key: ${NVIDIA_API_KEY:YOUR_NVIDIA_API_KEY_PLACEHOLDER}
  stt:
    api:
      key: ${NVIDIA_STT_API_KEY:YOUR_NVIDIA_STT_API_KEY_PLACEHOLDER}
    model: ${PARAKEET_MODEL:nvidia/parakeet-tdt-0.6b-v2}
  tts:
    api:
      key: ${NVIDIA_TTS_API_KEY:YOUR_NVIDIA_TTS_API_KEY_PLACEHOLDER}
    model: ${MAGPIE_MODEL:nvidia/magpie-tts-multilingual}
  base:
    url: ${NVIDIA_BASE_URL:https://integrate.api.nvidia.com/v1}
  ai:
    # API key — override with NVIDIA_API_KEY env var in production
    api-key: ${NVIDIA_API_KEY:YOUR_NVIDIA_API_KEY_PLACEHOLDER}

    # NVIDIA Build API endpoint (OpenAI-compatible chat completions)
    base-url: ${NVIDIA_API_URL:https://integrate.api.nvidia.com/v1/chat/completions}

    # Model — llama-3.3-70b matches your API usage
    model: ${NVIDIA_MODEL:meta/llama-3.1-70b-instruct}

    # Sampling parameters (matched from your API snippet)
    temperature: ${NVIDIA_TEMPERATURE:0.2}
    top-p: ${NVIDIA_TOP_P:0.7}
    max-tokens: ${NVIDIA_MAX_TOKENS:1024}

    # Reliability settings
    timeout-seconds: ${NVIDIA_TIMEOUT_SECONDS:60}
    retry-attempts: ${NVIDIA_RETRY_ATTEMPTS:3}
    retry-delay-ms: ${NVIDIA_RETRY_DELAY_MS:1000}

# ── Code Execution (Piston) ───────────────────────────────────
piston:
  api:
    url: ${PISTON_API_URL:https://emkc.org/api/v2/piston}

# ── Chatbot ───────────────────────────────────────────────────
chatbot:
  context-size: 10
  max-tokens: 1000
  truncate-limit: 1000

# ── Security ─────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:YOUR_JWT_SECRET_PLACEHOLDER}

# ── Google OAuth ─────────────────────────────────────────────
google:
  client-id: ${GOOGLE_CLIENT_ID:dummy}

# ── Admin ────────────────────────────────────────────────────
admin:
  registration:
    code: ${ADMIN_REGISTRATION_CODE:ADMIN123}
  email: ${ADMIN_EMAIL:admin@example.com}
  password-hash: ${ADMIN_PASSWORD_HASH:YOUR_ADMIN_PASSWORD_HASH_PLACEHOLDER}

# ── Frontend ─────────────────────────────────────────────────
frontend:
  url: ${FRONTEND_URL:http://localhost:3000}

# ── Actuator / Management ────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: false
    mail:
      enabled: false

# ── Web Push (VAPID) ─────────────────────────────────────────
vapid:
  public:
    key: ${VAPID_PUBLIC_KEY:dummy}
  private:
    key: ${VAPID_PRIVATE_KEY:dummy}
  subject: ${VAPID_SUBJECT:mailto:support@aiplacement.com}

# ── Rate Limiting ─────────────────────────────────────────────
ratelimit:
  login:
    capacity: ${RATE_LIMIT_LOGIN_CAPACITY:5}
    duration-seconds: ${RATE_LIMIT_LOGIN_DURATION:60}
  signup:
    capacity: ${RATE_LIMIT_SIGNUP_CAPACITY:3}
    duration-seconds: ${RATE_LIMIT_SIGNUP_DURATION:3600}
  chat:
    capacity: ${RATE_LIMIT_CHAT_CAPACITY:60}
    duration-seconds: ${RATE_LIMIT_CHAT_DURATION:60}
  resume-upload:
    capacity: ${RATE_LIMIT_RESUME_CAPACITY:10}
    duration-seconds: ${RATE_LIMIT_RESUME_DURATION:3600}
  ats:
    capacity: ${RATE_LIMIT_ATS_CAPACITY:20}
    duration-seconds: ${RATE_LIMIT_ATS_DURATION:3600}
  mock-interview:
    capacity: ${RATE_LIMIT_INTERVIEW_CAPACITY:15}
    duration-seconds: ${RATE_LIMIT_INTERVIEW_DURATION:3600}

# ── Supabase Storage ─────────────────────────────────────────
supabase:
